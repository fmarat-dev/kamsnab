# Продакшен-стек для VPS. Локально не запускается — локальная разработка Directus
# идёт на SQLite без Docker, см. cms/README.md.
#
# Использование на сервере (один раз, вручную):
#   cp .env.example .env   # заполнить секреты
#   docker compose up -d --build
#
# Дальше деплой автоматический по пушу в main, см. .github/workflows/deploy.yml —
# он просто повторяет `docker compose up -d --build` на сервере по SSH.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: directus
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: directus
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U directus"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  directus:
    image: directus/directus:11
    restart: unless-stopped
    # Порт наружу не публикуется — снаружи Directus доступен только через
    # caddy (cms.kamsnab.ru), см. Caddyfile.
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      KEY: ${DIRECTUS_KEY}
      SECRET: ${DIRECTUS_SECRET}

      DB_CLIENT: pg
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: directus
      DB_USER: directus
      DB_PASSWORD: ${POSTGRES_PASSWORD}

      CACHE_ENABLED: "true"
      CACHE_STORE: redis
      REDIS: redis://redis:6379

      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}

      PUBLIC_URL: ${DIRECTUS_PUBLIC_URL}

      CORS_ENABLED: "true"
      CORS_ORIGIN: ${CORS_ORIGIN}

      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_MANAGER_CHAT_ID: ${TELEGRAM_MANAGER_CHAT_ID}
      MAX_BOT_TOKEN: ${MAX_BOT_TOKEN}
      MAX_MANAGER_CHAT_ID: ${MAX_MANAGER_CHAT_ID}
    volumes:
      - directus-uploads:/directus/uploads
      - ../cms/schema:/directus/schema

  site:
    build:
      context: ..
      dockerfile: apps/site/Dockerfile
      args:
        NEXT_PUBLIC_DIRECTUS_URL: ${NEXT_PUBLIC_DIRECTUS_URL}
    restart: unless-stopped
    depends_on:
      - directus

  miniapp-telegram:
    build:
      context: ..
      dockerfile: apps/miniapp-telegram/Dockerfile
      args:
        VITE_DIRECTUS_URL: ${VITE_DIRECTUS_URL}
        VITE_MANAGER_TELEGRAM_USERNAME: ${VITE_MANAGER_TELEGRAM_USERNAME}
    restart: unless-stopped
    depends_on:
      - directus

  miniapp-max:
    build:
      context: ..
      dockerfile: apps/miniapp-max/Dockerfile
      args:
        VITE_DIRECTUS_URL: ${VITE_DIRECTUS_URL}
        VITE_MANAGER_MAX_LINK: ${VITE_MANAGER_MAX_LINK}
    restart: unless-stopped
    depends_on:
      - directus

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - site
      - miniapp-telegram
      - miniapp-max
      - directus

volumes:
  postgres-data:
  directus-uploads:
  caddy-data:
  caddy-config:
